about_content: | # this will include new lines to allow paragraphs
  Здравствуйте, меня зовут **Гарькина Елизавета**, дата рождения **01.09.2002**, в настоящее время проживаю в **Казани**.
  Занимаюсь разработкой мобильных приложений **с 2021 года**, работаю в коммерческой нативной Android-разработке: от продуктовых стартапов и аутсорса до крупного финтеха. Имею опыт **лидирования кросс-командных и кросс-платформенных фичей**, менторинга, внедрения новых технологий и архитектурных решений.
  Начинала с **Flutter** разработки, но довольно быстро увлеклась нативной разработкой. Также имею небольшой опыт создания сайтов используя **Asp.Net Core** и **ReactNative**.

  <mark>Желаемая должность:</mark> **Senior / Lead Android Разработчик**

  - Родной язык - Русский
  - Уровень Английского C1
  - Также немного знаю Французский и Испанский

  - Общительна и легко вливаюсь в коллектив
  - Быстро обучаюсь и любознательна
  - Всегда укладываюсь в сроки и обладаю задатками хорошего руководителя

