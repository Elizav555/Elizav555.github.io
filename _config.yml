        link: https://www.tbank.ru/
        link_text: tbank.ru
        sub_title: Senior Android Разработчица
        caption: Июнь 2024 - ...
        description: |
          <mark>Разработка крупного продуктового сервиса в составе одного из бизнес-стримов экосистемы банка. Работа в монорепозитории с мультимодульной архитектурой и интеграцией в мобильный банк.</mark><br>

            **Обязанности:**
            - Разработка и проектирование новых продуктовых фичей
            - Лидирование крупных кросс-командных и кросс-платформенных фичей в роли feature-owner
            - Проведение технических ресерчей, выбор архитектурных решений
            - Взаимодействие с продуктом, дизайном, аналитикой, бэкендом, iOS и смежными командами
            - Code-review внутри команды и в рамках inner source для смежных команд
            - Менторинг разработчиков и стажёров, онбординг новых сотрудников
            - Проведение командных встреч (оценка, тех-долг, демо, ретро)
            - Покрытие функционала Unit- и UI-тестами, поддержка тестовой инфраструктуры
            - Работа с релизным циклом, фича-тогглами, конфигами и аналитикой

            **Стек:** Kotlin • Coroutines • Flow • Jetpack Compose • XML • MotionLayout • MVI • MVVM • Clean Architecture • Многомодульная архитектура • Внутренние DI- и сетевые фреймворки • JUnit • Mockk • UI-тесты • Внутренние инструменты аналитики и конфигурации

            **Ключевые достижения:**

            *Лидерство и архитектурное влияние:*
            - Выступала feature-owner крупного кросс-платформенного проекта (Android, iOS, Web) на протяжении более года: проводила ресерчи, формировала требования, координировала команды, защищала архитектурные решения
            - Спроектировала и внедрила универсальный контракт для интеграции внешних сервисов в продукт, заложив основу для масштабируемых интеграций других бизнес-линий
            - Полностью переработала навигацию сервиса для поддержки параллельных пользовательских флоу, разделила backstack и состояние, унифицировала поведение шторок
            - Разработала RFC-подобную архитектурную спецификацию межплатформенного механизма конфигурации, согласованную с Web, iOS, бэкендом и дизайном

            *Влияние на продукт (метрики A/B-тестов):*
            - Запуск ключевой фичи: рост конверсии в целевое действие **+29%** (стат. значимо), uplift GMV **+39,8%**
            - Запуск интеграции внешнего сервиса: рост CR в карточку товара **+14,35%**, uplift CR в заказ **+19,7%** — без негативного влияния на основные метрики сервиса
            - Подтверждены ключевые продуктовые гипотезы, задавшие направление развития сервиса

            *Инженерная культура и процессы:*
            - Провела внедрение Jetpack Compose в проект: ресерч, базовые классы, инфраструктура UI-тестирования Compose, первый продуктовый экран, выступление на внутреннем демо
            - Существенно увеличила покрытие Unit- и UI-тестами, доработала базовый интерсептор для стабильности тестов, добавила поддержку тестирования уведомлений и Compose-экранов
            - Настроила инфраструктуру UI-тестов и ночной прогон для B2B-приложения, обеспечив раннее обнаружение регрессов
            - Внедрила измерение и визуализацию TTI-метрик в Grafana, инициировала унификацию метрик с iOS для сравнимости результатов
            - Переняла и формализовала проведение встреч по оценке и тех-долгу, составила календарь и регламент ответственных за релиз
            - Завела документацию по передаче знаний, метрикам и архитектурным решениям

            *Менторинг и комьюнити:*
            - Менторила студентов в рамках вузовской практики — многие студенты успешно прошли отбор и приняты в штат
            - Руководила мобильной практикой ИТИС, отвечала за: формирование требований, регламента, координация менторов, работа со студентами
            - Менторила студента в рамках внутренней Академии и стажёра из смежной команды
            - Представляла компанию на крупной внутренней конференции (700+ участников)

            *Прочее:*
            - Подтвердила грейд Senior в рамках внутренней аттестации
            - Получала позитивный фидбэк от команды, руководителя, продакта, дизайна и смежных команд по итогам review<br><br>

